  <!-- Texto ELAS -->
  <text x="85" y="50" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="40" font-weight="900" fill="url(#elasGradient)" letter-spacing="-1.5">ELAS</text>
